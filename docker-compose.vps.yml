version: '3.8'

services:
  database:
    image: postgres:13-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: 123
      POSTGRES_USER: postgres
      POSTGRES_DB: certifikedu
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - net

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: always
    env_file: ./.env
    environment:
      - DATABASE_URL=postgresql://postgres:123@database:5432/certifikedu
    depends_on:
      - database
    ports:
      - "3001:3001"
    networks:
      - net

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_URL=http://31.97.91.29:3001
        - VITE_APPLICATION_URL=http://31.97.91.29:3000
    restart: always
    ports:
      - "3000:80"
    networks:
      - net

  website:
    build:
      context: ../website
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_APP_URL=http://31.97.91.29
        - NEXT_PUBLIC_PLATFORM_URL=http://31.97.91.29:3000
        - SKIP_ENV_VALIDATION=true
        - NEXT_PUBLIC_SANITY_DATASET=staging
        - NEXT_PUBLIC_SANITY_PROJECT_ID=cil3po11
        - SANITY_API_TOKEN=ske6uDg7oWbqHfex8ZaFoMHKNFlhWj12D08oz234SYlMdAvbzJNEQ1BhXYWvCSZ8VYprPu3Uf2uEeWxsnaWGKvaOegcWVNiVC01gqp3BeGh1aK4eO8snsgbB0lwcKV4GOTUlHO76yLIhYyDoePKdeQ5isjeCJHoMEpDgR7Iwtz60I8uvQhER
        - SANITY_API_READ_TOKEN=ske6uDg7oWbqHfex8ZaFoMHKNFlhWj12D08oz234SYlMdAvbzJNEQ1BhXYWvCSZ8VYprPu3Uf2uEeWxsnaWGKvaOegcWVNiVC01gqp3BeGh1aK4eO8snsgbB0lwcKV4GOTUlHO76yLIhYyDoePKdeQ5isjeCJHoMEpDgR7Iwtz60I8uvQhER
    restart: always
    env_file: ../website/.env
    ports:
      - "80:3000"
    networks:
      - net

volumes:
  pgdata:

networks:
  net:
    driver: bridge
